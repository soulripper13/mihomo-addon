# Mihomo (Clash Meta) Config for Home Assistant Global VPN
# Path: /config/mihomo/config.yaml

# General Settings
mixed-port: 7893
port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
allow-lan: true
log-level: info
ipv6: true
mode: rule
bind-address: "*"
secret: "YOUR_DASHBOARD_SECRET"

# Dashboard Settings
external-controller: 0.0.0.0:9090
external-ui: "/ui"
external-ui-name: metacubexd

# TUN Mode - CRITICAL for Global VPN & Network Gateway
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'

# DNS Configuration
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  respect-rules: true
  default-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "ntp.*.org"
    - "+.pool.ntp.org"

# Sniffer for better domain identification
sniffer:
  enable: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true

# Proxies — add your own proxies here
proxies:
  - name: "My-Proxy-1"
    type: vless
    server: YOUR_SERVER_IP
    port: 443
    uuid: YOUR_UUID
    network: tcp
    tls: true
    servername: YOUR_SNI
    reality-opts:
      public-key: YOUR_PUBLIC_KEY
      short-id: YOUR_SHORT_ID
    client-fingerprint: chrome
    flow: xtls-rprx-vision

  # - name: "My-Proxy-2"
  #   type: hysteria2
  #   server: YOUR_SERVER_IP
  #   port: 8443
  #   password: YOUR_PASSWORD
  #   tls: true
  #   sni: YOUR_SNI
  #   alpn:
  #     - h3
  #   skip-cert-verify: false

proxy-groups:
  - name: "Auto"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - "My-Proxy-1"

  - name: "Select"
    type: select
    proxies:
      - "Auto"
      - "My-Proxy-1"
      - DIRECT

# Rules
rules:
  - MATCH,Select
